  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>

    /* Base state: background visible, arrow invisible */
    .custom-control {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.562); 
      top: 50%;
      transform: translateY(-50%);
      transition: background 0.2s ease, opacity 0.2s ease;
    }

    /* Hide arrows initially */
    .custom-control .carousel-control-prev-icon,
    .custom-control .carousel-control-next-icon {
      opacity: .5;             
      filter: invert(1);       
      width: 20px;
      height: 20px;
      transition: opacity 0.2s ease;
    }

    /* Hover state*/
    .custom-control:hover {
      background: rgb(255, 255, 255); 
      border: 1px solid rgba(0,0,0,0.5); 
    }

    .custom-control:hover .carousel-control-prev-icon,
    .custom-control:hover .carousel-control-next-icon {
      opacity: 1; 
  
    }
    .profile-btn:hover {
      border: 1px solid #000000;

  </style>
</head>
